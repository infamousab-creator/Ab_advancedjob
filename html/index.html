<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Job</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── BOSS MENU ─────────────────────────────── -->
<div id="bossMenu" class="panel hidden">
  <div class="panel-header">
    <span id="jobLabel" class="panel-title">Boss Menu</span>
    <button class="close-btn" onclick="closeUI()">✕</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('employees')">Employees</button>
    <button class="tab" onclick="switchTab('society')">Society</button>
    <button class="tab" onclick="switchTab('hire')">Hire</button>
  </div>

  <!-- Employees Tab -->
  <div id="tab-employees" class="tab-content active">
    <div class="search-bar">
      <input type="text" id="empSearch" placeholder="Search employees…" oninput="filterEmployees()">
    </div>
    <div id="employeeList" class="list-container"></div>
  </div>

  <!-- Society Tab -->
  <div id="tab-society" class="tab-content">
    <div class="society-balance">
      <span class="label">Society Balance</span>
      <span id="societyBalance" class="balance">$0</span>
    </div>
    <div class="input-row">
      <input type="number" id="withdrawAmt" placeholder="Amount" min="1">
      <button class="btn btn-danger" onclick="societyWithdraw()">Withdraw</button>
    </div>
    <div class="input-row">
      <input type="number" id="depositAmt" placeholder="Amount" min="1">
      <button class="btn btn-success" onclick="societyDeposit()">Deposit</button>
    </div>
  </div>

  <!-- Hire Tab -->
  <div id="tab-hire" class="tab-content">
    <p class="hint">Enter the Citizen ID of the player you want to hire:</p>
    <div class="input-row">
      <input type="text" id="hireCitizenId" placeholder="Citizen ID / Identifier">
      <button class="btn btn-success" onclick="hireEmployee()">Hire</button>
    </div>
  </div>
</div>

<!-- ── GARAGE MENU ────────────────────────────── -->
<div id="garageMenu" class="panel hidden">
  <div class="panel-header">
    <span class="panel-title">Job Garage</span>
    <button class="close-btn" onclick="closeUI()">✕</button>
  </div>
  <div id="vehicleList" class="vehicle-grid"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
